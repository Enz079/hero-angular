<div class="card" [style.background-color]="hero.completata ? 'lightyellow' : 'white'">
  <h2>{{ hero.nome }}</h2>
  <p>Potere: {{ hero.potere }}</p>
  <button (click)="notifyParent(); $event.stopPropagation()" [disabled]="hero.completata">
    Missione Compiuta
  </button>
  <button (click)="deleteHero(); $event.stopPropagation()" class="danger">
    Elimina
  </button>
</div>
